stages:
  - deploy

deploy_production:
  stage: deploy
  only:
    - main
  tags:
  tags:
    - kitcrm

  script:
    - echo "Deploying kitcrm..."

    - mkdir -p /home/www/kitcrm
    - rsync -av --delete ./ /home/www/kitcrm/

    - cd /home/www/kitcrm
      - cd /home/www/kitcrm

    - docker compose down
    - docker compose up -d --build

    # DEBUG (penting untuk lihat error)
    - docker exec kitcrm_app ls -la /var/www

    # INSTALL DEPENDENCY
    - docker exec kitcrm_app composer install --no-dev --optimize-autoloader --no-interaction

    # CEK
    - docker exec kitcrm_app ls -la /var/www/vendor

    # Laravel
    - docker exec kitcrm_app php artisan config:cache
    - docker exec kitcrm_app php artisan route:cache
    - docker exec kitcrm_app php artisan view:cache
