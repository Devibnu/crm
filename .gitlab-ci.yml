stages:
  - deploy

variables:
  DEPLOY_PATH: /home/www/kitcrm

deploy:
  stage: deploy
  tags:
    - kitcrm

  script:
    - echo "Start deploy..."

    - mkdir -p $DEPLOY_PATH
    - cd $DEPLOY_PATH

    # clone / update repo
    - |
      if [ ! -d ".git" ]; then
        git clone https://gitlab.krakatau-it.co.id/ibnuqosim/crm .
      else
        git fetch origin
        git reset --hard origin/main
      fi

    # build & run container
    - docker compose down
    - docker compose up -d --build

    # tunggu app ready
    - |
      until docker compose exec -T app php artisan --version; do
        echo "Waiting app..."
        sleep 3
      done

    # laravel optimize
    - docker compose exec -T app php artisan migrate --force
    - docker compose exec -T app php artisan config:cache
    - docker compose exec -T app php artisan route:cache

    - echo "Deploy selesai"
