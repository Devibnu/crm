stages:
  - build
  - deploy

variables:
  IMAGE_NAME: registry.gitlab.krakatau-it.co.id/ibnuqosim/crm

# ========================
# BUILD IMAGE
# ========================
build:
  stage: build
  tags:
    - docker
  script:
    - docker login registry.gitlab.krakatau-it.co.id -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker build -t $IMAGE_NAME:latest .
    - docker push $IMAGE_NAME:latest

# ========================
# DEPLOY
# ========================
deploy:
  stage: deploy
  tags:
    - kitcrm
  script:
    - cd /home/www/kitcrm

    - echo "Pull latest image..."
    - docker pull $IMAGE_NAME:latest

    - echo "Recreate app container only..."
    - docker compose up -d --no-deps app

    - echo "Wait app ready..."
    - |
      until docker compose exec -T app php artisan --version; do
        echo "Waiting app..."
        sleep 3
      done

    - echo "Run migration..."
    - docker compose exec -T app php artisan migrate --force

    - echo "Optimize..."
    - docker compose exec -T app php artisan config:cache
    - docker compose exec -T app php artisan route:cache

    - echo "Done deploy"
