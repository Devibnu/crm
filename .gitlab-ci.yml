stages:
  - deploy

deploy_production:
  stage: deploy
  only:
    - main
  tags:
    - kitcrm

  script:
    - echo "Deploying kitcrm..."

    # pastikan folder ada
    - mkdir -p /home/www/kitcrm

    # sync code dari runner ke server folder
    - rsync -av --delete ./ /home/www/kitcrm/

    - cd /home/www/kitcrm

    # build ulang container
    - docker compose down
    - docker compose up -d --build

    # Laravel optimize
    - docker exec kitcrm_app php artisan config:cache
    - docker exec kitcrm_app php artisan route:cache
    - docker exec kitcrm_app php artisan view:cache

    # migrate
    - docker exec kitcrm_app php artisan migrate --force

    - echo "Deployment selesai"
