stages:
  - build
  - deploy

variables:
  APP_DIR: /home/www/kitcrm

before_script:
  - echo "Start CI/CD"

build:
  stage: build
  script:
    - docker build -t kitcrm-app .

deploy:
  stage: deploy
  script:
    - echo "User: $(whoami)"
    - echo "Path: $(pwd)"
    - ls -la $DEPLOY_PATH

    - cd $DEPLOY_PATH

    - git pull origin main

    - docker compose up -d --build --remove-orphans

    - docker compose ps
