stages:
  - build
  - deploy

variables:
  IMAGE_NAME: registry.gitlab.krakatau-it.co.id/kitcrm

# -------------------------
# BUILD IMAGE
# -------------------------
build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build -t $IMAGE_NAME:$CI_COMMIT_SHA .
    - docker tag $IMAGE_NAME:$CI_COMMIT_SHA $IMAGE_NAME:latest
    - echo "$CI_REGISTRY_PASSWORD" | docker login registry.gitlab.krakatau-it.co.id -u $CI_REGISTRY_USER --password-stdin
    - docker push $IMAGE_NAME:$CI_COMMIT_SHA
    - docker push $IMAGE_NAME:latest

# -------------------------
# DEPLOY
# -------------------------
deploy_production:
  stage: deploy
  only:
    - main
  tags:
    - kitcrm
  script:
    - echo "Deploying via Docker image..."

    - cd /home/www/kitcrm

    - docker compose pull
    - docker compose up -d

    - docker exec kitcrm_app php artisan migrate --force
    - docker exec kitcrm_app php artisan config:cache
    - docker exec kitcrm_app php artisan route:cache
    - docker exec kitcrm_app php artisan view:cache
