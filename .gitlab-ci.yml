stages:
  - build
  - deploy

variables:
  APP_DIR: /home/www/kitcrm

before_script:
  - echo "Start CI/CD"

build:
  stage: build
  script:
    - docker build -t kitcrm-app .

deploy:
  stage: deploy
  tags:
    - kitcrm
  script:
    - ls -la $DEPLOY_PATH

    - mkdir -p $DEPLOY_PATH
    - cd $DEPLOY_PATH

    - |
      if [ ! -d ".git" ]; then
        echo "Clone repository..."
        git clone https://gitlab.krakatau-it.co.id/ibnuqosim/crm .
      else
        echo "Pull latest code..."
        git pull origin main
      fi

    - docker compose up -d --build --remove-orphans
    - docker compose ps

    - docker compose exec app php artisan migrate --force
    - docker compose exec app php artisan config:cache
