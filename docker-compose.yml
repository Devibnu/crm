services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: kitcrm_app
    volumes:
      - .:/var/www
    depends_on:
      - db
    networks:
      - web

  web:
    image: nginx:alpine
    container_name: kitcrm_nginx
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kitcrm.rule=Host(`pd.krakatau-it.co.id`)"
      - "traefik.http.routers.kitcrm.entrypoints=web"
      - "traefik.http.services.kitcrm.loadbalancer.server.port=80"
    depends_on:
      - app
    networks:
      - web

  db:
    image: postgres:16
    container_name: kitcrm_db
    restart: always
    environment:
      POSTGRES_DB: kitcrm
      POSTGRES_USER: kitcrm
      POSTGRES_PASSWORD: adm1n.kitcrm
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - web

volumes:
  pgdata:

networks:
  web:
    external: true
