
services:

  app:
    build: .
    container_name: kitcrm_app
    restart: always
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - postgres
    networks:
      - web

  nginx:
    image: nginx:latest
    container_name: kitcrm_nginx
    restart: always
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kitcrm.rule=Host(`kitcrm.local`)"
      - "traefik.http.routers.kitcrm.entrypoints=web"
    depends_on:
      - app
    networks:
      - web

  postgres:
    image: postgres:15
    container_name: kitcrm_postgres
    restart: always
    environment:
      POSTGRES_DB: kitcrm
      POSTGRES_USER: kitcrm
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - web

networks:
  web:

volumes:
  pgdata:
