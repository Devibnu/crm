services:
  app:
    # image: registry.gitlab.krakatau-it.co.id/ibnuqosim/crm:latest
    # container_name: kitcrm_app
    # restart: always
    # env_file:
    #   - .env
    build: .
    container_name: kitcrm_app
    restart: always
    env_file:
      - .env
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: kitcrm_nginx
    restart: always
    ports:
      - "80:80"
    depends_on:
      - app
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    networks:
      - app-network

networks:
  app-network:
    external: true
